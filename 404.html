<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 - OnlyOne</title>
    <link rel="stylesheet" href="/onlyone/shared/style.css">
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 5rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 8px;
        }
        .error-msg {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 8px;
        }
        .error-desc {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 24px;
        }
        .home-btn {
            display: inline-block;
            padding: 12px 32px;
            background: var(--primary);
            color: #fff;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <div class="error-msg">페이지를 찾을 수 없습니다</div>
        <div class="error-desc">요청하신 페이지가 존재하지 않거나 이동되었습니다.</div>
        <a href="/onlyone/index.html" class="home-btn">홈으로 돌아가기</a>
    </div>
</body>
</html>
