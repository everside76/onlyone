<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>쿠폰함 - OnlyOne</title>
    <link rel="stylesheet" href="../shared/style.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .coupon-locked .coupon-inner {
            filter: grayscale(0.8) brightness(0.6);
        }
        .coupon-locked .coupon-dl-btn {
            opacity: 0.3;
            pointer-events: none;
        }
        .coupon-lock-info {
            text-align: center;
            padding: 6px 16px 0;
            font-size: 0.72rem;
            color: var(--text-light);
        }
        .coupon-lock-info a {
            color: var(--primary);
            font-weight: 700;
        }
        .coupon-unlocked-badge {
            position: absolute;
            top: 10px;
            right: 14px;
            background: rgba(0,184,148,0.9);
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px;
            z-index: 2;
        }
    </style>
</head>
<body>

<header class="page-header">
    <h1>🎟️ 쿠폰함</h1>
</header>

<div class="content-area">
    <div class="coupon-list" id="coupon-list"></div>
    <div class="coupon-notice" style="background:var(--card-bg);border-radius:16px;margin:0 16px;padding:16px 20px;box-shadow:var(--shadow);text-align:center;border-left:4px solid var(--primary);">
        <div style="font-size:1rem;font-weight:800;margin-bottom:6px;">📍 쿠폰 사용 안내</div>
        <div style="font-size:0.9rem;font-weight:700;color:var(--primary);margin-bottom:4px;">5월 3일 (주일) 뭉게뭉게 마켓</div>
        <div style="font-size:0.78rem;color:var(--text-light);line-height:1.5;">
            저장된 쿠폰을 현장에서 제시하면 교환 가능합니다.<br>
            게임을 플레이하여 쿠폰을 해금하세요!
        </div>
    </div>
</div>

<canvas id="coupon-canvas"></canvas>

<script src="../shared/components.js"></script>
<script src="coupon.js"></script>
<script>
function renderCoupons() {
    const container = document.getElementById('coupon-list');
    container.innerHTML = COUPONS.map(c => {
        const unlocked = isUnlocked(c);
        return `
        <div class="coupon-card ${unlocked ? '' : 'coupon-locked'}" data-coupon-id="${c.id}">
            ${unlocked ? '<div class="coupon-unlocked-badge">해금됨 ✓</div>' : ''}
            <div class="coupon-inner" style="background: linear-gradient(135deg, ${c.colors[0]}, ${c.colors[1]})">
                <div class="coupon-emoji">${c.emoji}</div>
                <div class="coupon-info">
                    <div class="coupon-name">${c.name}</div>
                    <div class="coupon-label">${unlocked ? c.label : '🔒 잠김'}</div>
                </div>
                <div class="coupon-divider"></div>
                <div class="coupon-download-area">
                    <button class="coupon-dl-btn" onclick="downloadCoupon(${c.id})">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                    </button>
                    <span class="coupon-dl-text">${unlocked ? '저장' : ''}</span>
                </div>
            </div>
            <div class="coupon-lock-info">${unlocked ? '✅ ' : '🔒 '}조건: ${c.game}${unlocked ? '' : ' → <a href="../games/index.html">게임하러 가기</a>'}</div>
        </div>
        `;
    }).join('');
}

renderCoupons();
</script>
</body>
</html>
