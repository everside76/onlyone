<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 봄맞이 특별 행사 - OnlyOne</title>
    <link rel="stylesheet" href="../shared/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="page-header">
    <a href="index.html" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>행사 상세</h1>
</header>

<div class="content-area">
    <img src="https://via.placeholder.com/800x450/FF6B6B/fff?text=봄맞이+특별+행사" alt="행사 대표 이미지" class="event-detail-hero">

    <div class="event-detail-body">
        <div style="margin-bottom:12px">
            <span class="badge badge-upcoming">예정</span>
            <span class="badge" style="background:var(--bg);color:var(--text-light)">축제</span>
        </div>

        <div class="event-detail-title">2026 봄맞이 특별 행사</div>

        <table class="event-info-table">
            <tr><th>일시</th><td>2026년 5월 1일 (목) 오후 2:00 ~ 5:00</td></tr>
            <tr><th>장소</th><td>서울 올림픽공원 체조경기장</td></tr>
            <tr><th>참가비</th><td>무료</td></tr>
            <tr><th>대상</th><td>누구나 참여 가능</td></tr>
        </table>

        <div class="event-content">
            <p>봄을 맞아 OnlyOne이 준비한 특별 행사에 여러분을 초대합니다!</p>
            <p>다양한 공연과 체험 부스, 그리고 깜짝 이벤트가 준비되어 있습니다. 가족, 친구와 함께 즐거운 시간을 보내세요.</p>
            <p>현장에서 웹툰 작가 사인회도 진행됩니다. 많은 관심과 참여 부탁드립니다.</p>
        </div>

        <div class="video-section">
            <div class="video-title">행사 소개 영상</div>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>

        <div class="gallery-section">
            <div class="gallery-title">행사 이미지</div>
            <div class="gallery-scroll">
                <img src="https://via.placeholder.com/600x340/FF6B6B/fff?text=행사+사진+1" alt="행사 사진 1" loading="lazy">
                <img src="https://via.placeholder.com/600x340/ee5a24/fff?text=행사+사진+2" alt="행사 사진 2" loading="lazy">
                <img src="https://via.placeholder.com/600x340/e17055/fff?text=행사+사진+3" alt="행사 사진 3" loading="lazy">
            </div>
        </div>
    </div>
</div>

<script src="../shared/components.js"></script>
</body>
</html>
