<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>게임 대회 시즌 1 - OnlyOne</title>
    <link rel="stylesheet" href="../shared/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="page-header">
    <a href="index.html" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>행사 상세</h1>
</header>

<div class="content-area">
    <img src="https://via.placeholder.com/800x450/00b894/fff?text=게임+대회" alt="행사 대표 이미지" class="event-detail-hero">

    <div class="event-detail-body">
        <div style="margin-bottom:12px">
            <span class="badge badge-completed">완료</span>
            <span class="badge" style="background:var(--bg);color:var(--text-light)">대회</span>
        </div>

        <div class="event-detail-title">게임 대회 시즌 1</div>

        <table class="event-info-table">
            <tr><th>일시</th><td>2026년 4월 10일 (금) 오후 3:00 ~ 6:00</td></tr>
            <tr><th>장소</th><td>온라인</td></tr>
            <tr><th>참가</th><td>총 128명 참가</td></tr>
            <tr><th>종목</th><td>블록 쌓기 / 뱀 게임</td></tr>
        </table>

        <div class="event-content">
            <p>OnlyOne 모바일 게임 최고 점수 대회 시즌 1이 성황리에 종료되었습니다!</p>
            <p>블록 쌓기 부문과 뱀 게임 부문에서 각각 치열한 경쟁이 펼쳐졌습니다. 참가해 주신 모든 분들께 감사드립니다.</p>
            <p>시즌 2는 곧 공지될 예정이니 많은 관심 부탁드립니다!</p>
        </div>

        <div class="video-section">
            <div class="video-title">대회 하이라이트 영상</div>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/OsgjUY95cZ0" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>

        <div class="gallery-section">
            <div class="gallery-title">대회 스크린샷</div>
            <div class="gallery-scroll">
                <img src="https://via.placeholder.com/600x340/00b894/fff?text=대회+장면+1" alt="대회 1" loading="lazy">
                <img src="https://via.placeholder.com/600x340/00cec9/fff?text=대회+장면+2" alt="대회 2" loading="lazy">
            </div>
        </div>
    </div>
</div>

<script src="../shared/components.js"></script>
</body>
</html>
