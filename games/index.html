<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모바일 게임 - OnlyOne</title>
    <link rel="stylesheet" href="../shared/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="page-header">
    <h1>모바일 게임</h1>
</header>

<div class="content-area">
    <div class="grid-2" id="game-list"></div>
</div>

<script src="../shared/components.js"></script>
<script>
const GAMES = [
    {
        id: 'tetris',
        title: '블록 쌓기',
        desc: '떨어지는 블록을 쌓아 줄을 완성하세요!',
        icon: '🧱',
        color: 'linear-gradient(135deg, #6c5ce7, #a29bfe)',
        scoreKey: 'onlyone_tetris_high',
        couponKey: 'onlyone_coupon_짜장밥',
        couponName: '🍚 짜장밥',
        condition: '10줄 완성'
    },
    {
        id: 'memory',
        title: '두더지 잡기',
        desc: '나타나는 두더지를 빠르게 터치!',
        icon: '🐹',
        color: 'linear-gradient(135deg, #fd79a8, #e84393)',
        scoreKey: 'onlyone_memory_high',
        couponKey: 'onlyone_coupon_오뎅탕',
        couponName: '🍢 오뎅탕',
        condition: '5번 클리어(20마리↑)'
    },
    {
        id: 'snake',
        title: '애벌레 게임',
        desc: '먹이를 먹으며 애벌레를 키우세요!',
        icon: '🐛',
        color: 'linear-gradient(135deg, #00b894, #55efc4)',
        scoreKey: 'onlyone_snake_high',
        couponKey: 'onlyone_coupon_팝콘',
        couponName: '🍿 팝콘',
        condition: '100점 달성'
    },
    {
        id: 'quiz',
        title: '행사 퀴즈',
        desc: '소풍 행사 퀴즈에 도전하세요!',
        icon: '❓',
        color: 'linear-gradient(135deg, #F39C12, #FDCB6E)',
        scoreKey: 'onlyone_quiz_high',
        couponKey: 'onlyone_coupon_떡볶이',
        couponName: '🌶️ 떡볶이',
        condition: '5개 정답'
    }
];

function renderGames() {
    const container = document.getElementById('game-list');
    container.innerHTML = GAMES.map(g => {
        const highScore = localStorage.getItem(g.scoreKey) || 0;
        const unlocked = localStorage.getItem(g.couponKey);
        const couponHtml = unlocked
            ? `<div class="game-card-score has-score">🎟️ ${g.couponName} 쿠폰 해금!</div>`
            : `<div class="game-card-score no-score">🔒 ${g.condition} → ${g.couponName} 쿠폰</div>`;
        return `
            <a href="${g.id}/index.html" class="game-card">
                <div class="game-card-icon" style="background:${g.color}">${g.icon}</div>
                <div class="game-card-body">
                    <div class="game-card-title">${g.title}</div>
                    <div class="game-card-desc">${g.desc}</div>
                    ${couponHtml}
                </div>
            </a>
        `;
    }).join('');
}

renderGames();
</script>
</body>
</html>
