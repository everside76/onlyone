<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>두더지 잡기 - OnlyOne 게임</title>
    <link rel="stylesheet" href="../../shared/style.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .mole-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 16px;
            max-width: 340px;
            margin: 0 auto;
        }

        .mole-hole {
            aspect-ratio: 1;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s, transform 0.15s;
            user-select: none;
        }

        .mole-hole.active {
            background: rgba(255,255,255,0.15);
            border-color: rgba(253,203,110,0.5);
            animation: mole-pop 0.2s ease-out;
        }

        .mole-hole.hit {
            background: rgba(0,184,148,0.3);
            border-color: #00B894;
            transform: scale(0.9);
        }

        .mole-hole.miss {
            background: rgba(255,107,107,0.3);
            border-color: #FF6B6B;
        }

        @keyframes mole-pop {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }

        .mole-stats {
            display: flex;
            justify-content: center;
            gap: 28px;
            padding: 10px 0;
            color: #fff;
            font-size: 0.85rem;
        }
        .mole-stats span { font-weight: 800; color: #FDCB6E; }

        .mole-timer-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin: 0 16px;
            border-radius: 4px;
            overflow: hidden;
            max-width: 340px;
            margin: 0 auto;
        }
        .mole-timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00B894, #FDCB6E);
            border-radius: 4px;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-top-bar">
        <button class="back" onclick="location.href='../index.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            목록
        </button>
        <div class="score-display">점수: <span id="score">0</span></div>
        <div class="score-display" style="font-size:0.8rem">남은: <span id="remaining">30</span></div>
    </div>

    <div class="mole-stats">
        <div>잡은 수: <span id="caught">0</span></div>
        <div>놓친 수: <span id="missed">0</span></div>
    </div>

    <div class="mole-timer-bar"><div class="mole-timer-fill" id="timer-bar" style="width:100%"></div></div>

    <div class="mole-board" id="board"></div>
</div>

<div class="game-start-overlay" id="start-screen">
    <h2>🐹 두더지 잡기</h2>
    <p>나타나는 두더지를 빠르게 터치하세요!<br>💣 폭탄은 피하세요! (-30점)<br><strong>30마리 중 20마리 이상 잡으면 클리어!</strong></p>
    <p style="margin-top:12px;padding:8px 20px;background:rgba(255,255,255,0.1);border-radius:10px;font-size:0.82rem;color:#FDCB6E;font-weight:700;">🎟️ 1번 클리어 → 🍢 오뎅탕 쿠폰 해금!</p>
    <button class="start-btn" onclick="startGame()">게임 시작</button>
</div>

<div class="game-overlay" id="game-over">
    <h2>게임 완료!</h2>
    <div class="final-score" id="final-score">0</div>
    <div class="high-score" id="result-text">30마리 중 0마리 잡음</div>
    <div class="high-score" id="high-score-text">최고 점수: 0</div>
    <div id="coupon-reward" style="margin-bottom:16px"></div>
    <button class="btn-restart" onclick="startGame()">다시 하기</button>
    <button class="btn-menu" onclick="location.href='../index.html'">목록으로</button>
</div>

<script src="game.js"></script>
</body>
</html>
