<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>카드 뒤집기 - OnlyOne 게임</title>
    <link rel="stylesheet" href="../../shared/style.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .memory-board {
            display: grid;
            gap: 8px;
            padding: 12px;
            max-width: 400px;
            margin: 0 auto;
        }
        .memory-board.cols-4 { grid-template-columns: repeat(4, 1fr); }
        .memory-board.cols-5 { grid-template-columns: repeat(5, 1fr); }

        .mem-card {
            aspect-ratio: 3/4;
            perspective: 600px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .mem-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.4s;
            transform-style: preserve-3d;
        }
        .mem-card.flipped .mem-card-inner {
            transform: rotateY(180deg);
        }
        .mem-card.matched .mem-card-inner {
            transform: rotateY(180deg);
            opacity: 0.6;
        }
        .mem-card-front, .mem-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mem-card-back {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            font-size: 1.5rem;
            color: #fff;
        }
        .mem-card-front {
            background: #fff;
            transform: rotateY(180deg);
            font-size: 2rem;
            border: 2px solid #e0e0e0;
        }

        .memory-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 8px 0;
            color: #fff;
            font-size: 0.85rem;
        }
        .memory-stats span { font-weight: 700; }

        .difficulty-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }
        .diff-btn {
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.3);
            background: none;
            color: #fff;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .diff-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
<div class="game-wrapper" style="background:#1a1a2e">
    <div class="game-top-bar">
        <button class="back" onclick="location.href='../index.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            목록
        </button>
        <div class="score-display">시도: <span id="attempts">0</span></div>
        <div class="score-display" style="font-size:0.8rem">⏱ <span id="timer">0</span>초</div>
    </div>

    <div class="memory-stats">
        <div>매칭: <span id="matches">0</span> / <span id="total-pairs">0</span></div>
    </div>

    <div class="memory-board cols-4" id="board"></div>
</div>

<div class="game-start-overlay" id="start-screen">
    <h2>🃏 카드 뒤집기</h2>
    <p>같은 그림의 카드 쌍을 찾아 뒤집으세요!<br>적은 시도로 완성할수록 높은 점수!</p>
    <div class="difficulty-btns">
        <button class="diff-btn active" onclick="selectDiff(this, 12)">쉬움 (4x3)</button>
        <button class="diff-btn" onclick="selectDiff(this, 16)">보통 (4x4)</button>
        <button class="diff-btn" onclick="selectDiff(this, 20)">어려움 (5x4)</button>
    </div>
    <br>
    <button class="start-btn" onclick="startGame()">게임 시작</button>
</div>

<div class="game-overlay" id="game-over">
    <h2>축하합니다! 🎉</h2>
    <div class="final-score" id="final-score">0</div>
    <div class="high-score" id="result-text">0회 시도 / 0초</div>
    <div class="high-score" id="high-score-text">최고 점수: 0</div>
    <button class="btn-restart" onclick="startGame()">다시 하기</button>
    <button class="btn-menu" onclick="location.href='../index.html'">목록으로</button>
</div>

<script src="game.js"></script>
</body>
</html>
