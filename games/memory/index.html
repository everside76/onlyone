<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>행사 카드 뒤집기 - OnlyOne 게임</title>
    <link rel="stylesheet" href="../../shared/style.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .memory-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 16px;
            max-width: 320px;
            margin: 0 auto;
        }

        .mem-card {
            aspect-ratio: 1;
            perspective: 600px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .mem-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.4s;
            transform-style: preserve-3d;
        }
        .mem-card.flipped .mem-card-inner {
            transform: rotateY(180deg);
        }
        .mem-card.matched .mem-card-inner {
            transform: rotateY(180deg);
            opacity: 0.6;
        }
        .mem-card-front, .mem-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mem-card-back {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            font-size: 1.8rem;
            color: #fff;
        }
        .mem-card-front {
            background: #fff;
            transform: rotateY(180deg);
            font-size: 2.2rem;
            border: 2px solid #e0e0e0;
        }

        .memory-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 8px 0;
            color: #fff;
            font-size: 0.85rem;
        }
        .memory-stats span { font-weight: 700; }
    </style>
</head>
<body>
<div class="game-wrapper" style="background:#1a1a2e">
    <div class="game-top-bar">
        <button class="back" onclick="location.href='../index.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            목록
        </button>
        <div class="score-display">시도: <span id="attempts">0</span></div>
        <div class="score-display" style="font-size:0.8rem">⏱ <span id="timer">0</span>초</div>
    </div>

    <div class="memory-stats">
        <div>매칭: <span id="matches">0</span> / <span id="total-pairs">4</span></div>
    </div>

    <div class="memory-board" id="board"></div>
</div>

<div class="game-start-overlay" id="start-screen">
    <h2>🃏 행사 카드 뒤집기</h2>
    <p>소풍 행사 아이콘의 짝을 맞춰보세요!<br>🎉 보너스 카드도 찾아보세요!</p>
    <p style="margin-top:12px;padding:8px 20px;background:rgba(255,255,255,0.1);border-radius:10px;font-size:0.82rem;color:#FDCB6E;font-weight:700;">🎟️ 5번 클리어 → 🍢 오뎅탕 쿠폰 해금!</p>
    <button class="start-btn" onclick="startGame()">게임 시작</button>
</div>

<div class="game-overlay" id="game-over">
    <h2>축하합니다! 🎉</h2>
    <div class="final-score" id="final-score">0</div>
    <div class="high-score" id="result-text">0회 시도 / 0초</div>
    <div class="high-score" id="high-score-text">최고 점수: 0</div>
    <div id="coupon-reward" style="margin-bottom:16px"></div>
    <button class="btn-restart" onclick="startGame()">다시 하기</button>
    <button class="btn-menu" onclick="location.href='../index.html'">목록으로</button>
</div>

<script src="game.js"></script>
</body>
</html>
