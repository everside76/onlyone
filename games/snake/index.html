<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>애벌레 게임 - OnlyOne 게임</title>
    <link rel="stylesheet" href="../../shared/style.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="game-wrapper" style="background:#1a1a2e">
    <div class="game-top-bar">
        <button class="back" onclick="location.href='../index.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            목록
        </button>
        <div class="score-display">점수: <span id="score">0</span></div>
        <button class="pause-btn" id="pause-btn" onclick="togglePause()">일시정지</button>
    </div>
    <div class="game-canvas-area">
        <canvas id="game"></canvas>
    </div>
</div>

<div class="game-start-overlay" id="start-screen">
    <h2>🐛 애벌레 게임</h2>
    <p>스와이프하여 방향을 바꾸세요.<br>먹이를 먹으면 애벌레가 길어집니다!<br>벽이나 자신의 몸에 부딪히면 게임 오버!</p>
    <button class="start-btn" onclick="startGame()">게임 시작</button>
</div>

<div class="game-overlay" id="game-over">
    <h2>게임 오버</h2>
    <div class="final-score" id="final-score">0</div>
    <div class="high-score" id="high-score-text">최고 점수: 0</div>
    <div id="coupon-reward" style="margin-bottom:16px"></div>
    <button class="btn-restart" onclick="startGame()">다시 하기</button>
    <button class="btn-menu" onclick="location.href='../index.html'">목록으로</button>
</div>

<script src="game.js"></script>
</body>
</html>
