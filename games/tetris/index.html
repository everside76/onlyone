<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>블록 쌓기 - OnlyOne 게임</title>
    <link rel="stylesheet" href="../../shared/style.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .tetris-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: rgba(0,0,0,0.15);
            color: #fff;
        }
        .tetris-info-bar .next-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.06);
            padding: 4px 10px 4px 12px;
            border-radius: 10px;
        }
        .tetris-info-bar .next-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.5px;
        }
        .tetris-info-bar .next-box canvas {
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-top-bar">
        <button class="back" onclick="location.href='../index.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            목록
        </button>
        <div class="score-display">줄: <span id="lines-count">0</span></div>
        <button class="pause-btn" id="pause-btn" onclick="togglePause()">일시정지</button>
    </div>
    <div class="tetris-info-bar">
        <div></div>
        <div class="next-box">
            <span class="next-label">다음</span>
            <canvas id="next-canvas" width="56" height="56"></canvas>
        </div>
    </div>
    <div class="game-canvas-area">
        <canvas id="game"></canvas>
    </div>
</div>

<div class="game-start-overlay" id="start-screen">
    <h2>🧱 블록 쌓기</h2>
    <p>좌우 스와이프: 이동<br>탭: 회전<br>아래 스와이프: 빠른 낙하</p>
    <p style="margin-top:12px;padding:8px 20px;background:rgba(255,255,255,0.1);border-radius:10px;font-size:0.82rem;color:#FDCB6E;font-weight:700;">🎟️ 10줄 완성 → 🍚 짜장밥 쿠폰 해금!</p>
    <button class="start-btn" onclick="startGame()">게임 시작</button>
</div>

<div class="game-overlay" id="game-over">
    <h2>게임 오버</h2>
    <div class="final-score" id="final-score">0</div>
    <div class="high-score" id="high-score-text">최고 기록: 0줄</div>
    <div id="coupon-reward" style="margin-bottom:16px"></div>
    <button class="btn-restart" onclick="startGame()">다시 하기</button>
    <button class="btn-menu" onclick="location.href='../index.html'">목록으로</button>
</div>

<script src="../../shared/effects.js?v=4"></script>
<script src="game.js?v=4"></script>
</body>
</html>
